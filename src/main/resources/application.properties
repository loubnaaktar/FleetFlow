spring.application.name=FleetFlow
spring.datasource.url=jdbc:mysql://localhost:3307/fleetflow?createDatabaseIfNotExist=true
#spring.datasource.url=jdbc:mysql://mysql-container:3306/fleetflow?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=rootpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

